<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Snake</title>
  </head>
  <body style="margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #d5dbdb">
    <canvas id="c" width="512" height="512" style="border: 2px solid #566573"></canvas>
    <script>
      const S = 16; // pixel size of one grid cell
      const N = 32; // grid is N x N cells (32 * 16 = 512)
      const ctx = c.getContext("2d");

      let snake, dx, dy, fx, fy, len;
      const rnd = () => (Math.random() * N) | 0;

      function reset() {
        snake = [{ x: 16, y: 16 }];
        dx = 1;
        dy = 0;
        fx = rnd();
        fy = rnd();
        len = 4;
      }
      reset();

      // Arrow keys, ignoring reversals onto the snake's own neck
      onkeydown = (e) => {
        const [x, y] =
          { ArrowLeft: [-1, 0], ArrowUp: [0, -1], ArrowRight: [1, 0], ArrowDown: [0, 1] }[e.key] || [];
        if (x != null && x != -dx && y != -dy) {
          dx = x;
          dy = y;
        }
      };

      setInterval(() => {
        // Next head cell, wrapping around the edges
        const head = { x: (snake[0].x + dx + N) % N, y: (snake[0].y + dy + N) % N };

        // Ran into itself -> start over
        if (snake.some((s) => s.x == head.x && s.y == head.y)) return reset();

        snake.unshift(head);

        // Ate the food -> grow and respawn it
        if (head.x == fx && head.y == fy) {
          len++;
          fx = rnd();
          fy = rnd();
        }
        while (snake.length > len) snake.pop();

        // Draw
        ctx.fillStyle = "#e5e7e9";
        ctx.fillRect(0, 0, 512, 512);
        ctx.fillStyle = "#45b39d";
        ctx.fillRect(fx * S, fy * S, S - 1, S - 1);
        ctx.fillStyle = "#566573";
        for (const s of snake) ctx.fillRect(s.x * S, s.y * S, S - 1, S - 1);
      }, 120);
    </script>
  </body>
</html>
